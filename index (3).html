<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tawheeda Huq — Founder · Investor</title>
<meta name="description" content="Founder and investor-in-training building in halal fintech's least-served market — with venture and investment analysis." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#faf9f5; --paper-2:#f1efe8;
    --ink:#141210; --ink-2:#1d1a16;
    --signal:#ff4d17; --signal-ink:#1a0d06;
    --muted:#6b6660; --muted-d:rgba(250,249,245,.6);
    --line:rgba(20,18,16,.13); --line-d:rgba(250,249,245,.16);
    --disp:"Bricolage Grotesque",system-ui,sans-serif;
    --body:"Space Grotesk",system-ui,sans-serif;
    --mono:"Space Mono",ui-monospace,monospace;
    --maxw:1120px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
  body{font-family:var(--body);background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit}
  .wrap{width:100%;max-width:var(--maxw);margin:0 auto;padding:0 26px}
  .label{font-family:var(--mono);font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--signal);font-weight:700}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:16px 26px;transition:background .35s,backdrop-filter .35s}
  nav.scrolled{background:rgba(20,18,16,.9);backdrop-filter:blur(8px)}
  nav .mark{font-family:var(--disp);font-weight:800;font-size:1.2rem;letter-spacing:-.02em;color:var(--paper)}
  nav .mark .dot{color:var(--signal)}
  nav .links{display:flex;gap:22px}
  nav .links a{font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--paper);text-decoration:none;opacity:.72;transition:opacity .2s,color .2s}
  nav .links a:hover,nav .links a:focus-visible{opacity:1;color:var(--signal)}
  @media (max-width:760px){nav .links{display:none}}

  /* HERO */
  .hero{background:var(--ink);color:var(--paper);min-height:100vh;display:flex;align-items:center;position:relative}
  .hero-inner{padding:130px 0 70px}
  .hero .label{display:block;margin-bottom:24px;color:var(--signal)}
  .hero h1{font-family:var(--disp);font-weight:800;font-size:clamp(2.9rem,8.5vw,6.2rem);line-height:.97;letter-spacing:-.03em;margin-bottom:30px;max-width:14ch}
  .hero h1 .hl{color:var(--signal)}
  .hero .sub{font-size:clamp(1.05rem,2.1vw,1.35rem);max-width:600px;color:var(--muted-d);margin-bottom:38px;line-height:1.5}
  .cta{display:flex;gap:13px;flex-wrap:wrap}
  .btn{font-family:var(--mono);font-weight:700;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;padding:15px 24px;border:2px solid var(--signal);transition:transform .18s,background .18s,color .18s}
  .btn.solid{background:var(--signal);color:var(--signal-ink)}
  .btn.solid:hover,.btn.solid:focus-visible{transform:translate(-2px,-2px)}
  .btn.ghost{background:transparent;color:var(--paper);border-color:var(--line-d)}
  .btn.ghost:hover,.btn.ghost:focus-visible{border-color:var(--signal);color:var(--signal)}

  /* TICKER */
  .ticker{background:var(--signal);color:var(--signal-ink);overflow:hidden;border-top:2px solid var(--ink);border-bottom:2px solid var(--ink);white-space:nowrap;padding:12px 0}
  .ticker-track{display:inline-flex;gap:0;will-change:transform;animation:scroll 32s linear infinite}
  .ticker-track span{font-family:var(--mono);font-weight:700;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;padding:0 22px;position:relative}
  .ticker-track span::after{content:"◆";position:absolute;right:-5px;top:0;font-size:.6rem;opacity:.55}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .ticker:hover .ticker-track{animation-play-state:paused}
  @media (prefers-reduced-motion:reduce){.ticker-track{animation:none}}

  /* SECTION SHELL */
  .sec{padding:100px 0}
  .sec.paper{background:var(--paper)}
  .sec.dark{background:var(--ink);color:var(--paper)}
  .head{margin-bottom:50px;max-width:680px}
  .head .label{display:block;margin-bottom:14px}
  .head h2{font-family:var(--disp);font-weight:800;font-size:clamp(2rem,5.2vw,3.3rem);line-height:1;letter-spacing:-.025em}
  .head .lede{margin-top:16px;font-size:1.08rem;color:var(--muted)}
  .sec.dark .head .lede{color:var(--muted-d)}

  /* MANIFESTO */
  .manifesto{background:var(--paper-2)}
  .manifesto .wrap{padding:96px 26px}
  .manifesto .label{display:block;margin-bottom:24px}
  .manifesto p{font-family:var(--disp);font-weight:600;font-size:clamp(1.7rem,4.2vw,2.7rem);line-height:1.22;letter-spacing:-.02em;max-width:900px}
  .manifesto p .hl{color:var(--signal)}

  /* PILLAR head w/ number */
  .pillar-head{display:flex;align-items:flex-start;gap:24px;margin-bottom:48px}
  .pillar-head .num{font-family:var(--disp);font-weight:800;font-size:clamp(2.6rem,6vw,4rem);line-height:.85;color:var(--signal);flex:none}
  .pillar-head .ht .label{display:block;margin-bottom:12px}
  .pillar-head h2{font-family:var(--disp);font-weight:800;font-size:clamp(2rem,5.2vw,3.3rem);line-height:1;letter-spacing:-.025em}
  .pillar-head .lede{margin-top:14px;font-size:1.05rem;color:var(--muted);max-width:560px}
  .sec.dark .pillar-head .lede{color:var(--muted-d)}

  /* PILLAR I startup */
  .startup-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:46px;align-items:start}
  @media (max-width:820px){.startup-grid{grid-template-columns:1fr;gap:32px}}
  .startup-grid .name{font-family:var(--disp);font-weight:800;font-size:clamp(2.8rem,7vw,4.5rem);line-height:.9;letter-spacing:-.03em;margin-bottom:8px}
  .startup-grid .kick{font-family:var(--mono);font-weight:700;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;color:var(--signal);margin-bottom:22px}
  .startup-grid .body p{color:var(--muted-d);margin-bottom:14px;font-size:1.02rem}
  .startup-grid .frame{border-left:3px solid var(--signal);padding:4px 0 4px 20px;margin-top:24px;font-family:var(--disp);font-weight:600;font-size:1.35rem;line-height:1.3}
  .startup-grid .frame em{font-style:normal;color:var(--signal)}
  .startup-side ul{list-style:none}
  .startup-side li{padding:15px 0;border-top:1px solid var(--line-d);font-size:.95rem;color:var(--paper)}
  .startup-side li:last-child{border-bottom:1px solid var(--line-d)}
  .startup-side li b{display:block;font-family:var(--mono);font-weight:700;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--signal);margin-bottom:5px}
  .startup-side li a{color:var(--signal);text-decoration:none;border-bottom:1px solid var(--signal)}

  /* PILLAR II research */
  .research-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border-top:2px solid var(--ink)}
  @media (max-width:720px){.research-grid{grid-template-columns:1fr}}
  .memo{padding:30px 26px;border-bottom:2px solid var(--ink);border-right:2px solid var(--ink);display:flex;flex-direction:column;gap:13px;transition:background .2s}
  .memo:nth-child(2n){border-right:none}
  @media (max-width:720px){.memo{border-right:none}}
  .memo:hover{background:var(--paper-2)}
  .memo .top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .memo .tk{font-family:var(--mono);font-weight:700;font-size:.7rem;letter-spacing:.1em;color:var(--ink)}
  .memo .st{font-family:var(--mono);font-weight:700;font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--signal)}
  .memo h4{font-family:var(--disp);font-weight:700;font-size:1.45rem;line-height:1.05;letter-spacing:-.015em}
  .memo p{font-size:.95rem;color:var(--muted)}
  .memo .note{font-family:var(--mono);font-size:.66rem;letter-spacing:.02em;color:var(--signal);margin-top:auto;padding-top:10px}

  /* PILLAR III thesis (dark) */
  .thesis-body{max-width:780px}
  .thesis-body .lead{font-family:var(--disp);font-weight:700;font-size:clamp(1.55rem,3.6vw,2.3rem);line-height:1.22;letter-spacing:-.02em;margin-bottom:24px}
  .thesis-body .lead .hl{color:var(--signal)}
  .thesis-body p{color:var(--muted-d);margin-bottom:16px;font-size:1.04rem}
  .principles{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:46px;border-top:2px solid var(--signal)}
  @media (max-width:760px){.principles{grid-template-columns:1fr}}
  .principle{padding:22px 22px 22px 0;border-right:1px solid var(--line-d)}
  .principle:last-child{border-right:none}
  @media (max-width:760px){.principle{border-right:none;border-bottom:1px solid var(--line-d);padding-right:22px}}
  .principle .pn{font-family:var(--mono);font-weight:700;font-size:.66rem;letter-spacing:.1em;color:var(--signal)}
  .principle h5{font-family:var(--disp);font-weight:700;font-size:1.3rem;line-height:1.05;margin:8px 0;letter-spacing:-.01em}
  .principle p{font-size:.92rem;color:var(--muted-d)}

  /* CONTACT (signal block) */
  .contact{background:var(--signal);color:var(--signal-ink);padding:100px 0 64px}
  .contact .label{color:var(--signal-ink);display:block;margin-bottom:16px;opacity:.75}
  .contact h2{font-family:var(--disp);font-weight:800;font-size:clamp(2.6rem,9vw,5.5rem);line-height:.92;letter-spacing:-.03em;margin-bottom:34px}
  .contact-links{display:flex;flex-wrap:wrap;gap:12px 36px}
  .contact-links a{font-family:var(--mono);font-weight:700;font-size:.9rem;letter-spacing:.02em;color:var(--signal-ink);text-decoration:none;border-bottom:2px solid var(--signal-ink);padding-bottom:4px;transition:opacity .2s}
  .contact-links a:hover,.contact-links a:focus-visible{opacity:.6}
  .contact-links .val{font-weight:400}
  .contact-links .ph{font-weight:400;opacity:.6}

  footer{background:var(--ink);color:var(--muted-d);font-family:var(--mono);font-size:.68rem;letter-spacing:.05em;padding:24px 0}
  footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  footer .hl{color:var(--signal)}

  .reveal{opacity:0;transform:translateY(22px);transition:opacity .6s,transform .6s}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}
  :focus-visible{outline:2px solid var(--signal);outline-offset:3px}
</style>
</head>
<body>

<nav id="nav">
  <div class="mark" id="navMark"></div>
  <div class="links">
    <a href="#startup">Company</a>
    <a href="#research">Desk</a>
    <a href="#thesis">Thesis</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<header class="hero">
  <div class="wrap hero-inner">
    <span class="label" id="heroLabel"></span>
    <h1 id="heroTitle"></h1>
    <p class="sub" id="heroSub"></p>
    <div class="cta">
      <a class="btn solid" href="#startup">See the work</a>
      <a class="btn ghost" href="#contact">Get in touch</a>
    </div>
  </div>
</header>

<div class="ticker" aria-hidden="true"><div class="ticker-track" id="ticker"></div></div>

<section class="manifesto" id="manifesto">
  <div class="wrap reveal">
    <span class="label">The short version</span>
    <p id="manifestoText"></p>
  </div>
</section>

<section class="sec dark" id="startup">
  <div class="wrap">
    <div class="pillar-head reveal">
      <div class="num">01</div>
      <div class="ht"><span class="label">The Company</span><h2 id="startupHead"></h2><p class="lede" id="startupLede"></p></div>
    </div>
    <div class="startup-grid">
      <div class="reveal">
        <div class="name" id="startupName"></div>
        <div class="kick" id="startupKick"></div>
        <div class="body" id="startupBody"></div>
        <div class="frame" id="startupFrame"></div>
      </div>
      <div class="startup-side reveal"><ul id="startupFacts"></ul></div>
    </div>
  </div>
</section>

<section class="sec paper" id="research">
  <div class="wrap">
    <div class="pillar-head reveal">
      <div class="num">02</div>
      <div class="ht"><span class="label">The Desk</span><h2 id="researchHead"></h2><p class="lede" id="researchLede"></p></div>
    </div>
    <div class="research-grid reveal" id="researchGrid"></div>
  </div>
</section>

<section class="sec dark" id="thesis">
  <div class="wrap">
    <div class="pillar-head reveal">
      <div class="num">03</div>
      <div class="ht"><span class="label">The Thesis</span><h2 id="thesisHead"></h2><p class="lede" id="thesisLede"></p></div>
    </div>
    <div class="thesis-body reveal" id="thesisBody"></div>
    <div class="principles reveal" id="principles"></div>
  </div>
</section>

<section class="contact" id="contact">
  <div class="wrap reveal">
    <span class="label">Contact</span>
    <h2 id="contactHead"></h2>
    <div class="contact-links" id="contactLinks"></div>
  </div>
</section>

<footer><div class="wrap">
  <span id="footName"></span>
  <span id="footTag"></span>
</div></footer>

<script>
/* =============================================================
   EDIT EVERYTHING HERE.
   This single CONTENT object drives the whole page. Change any
   text, add/remove cards, swap links — you never touch the design.
   <span class="hl">...</span> = orange highlight.  <em>...</em> in the
   startup frame also highlights.  Anything in [brackets] is a
   placeholder for you to fill in.
   ============================================================= */
const CONTENT = {
  name: "Tawheeda",
  surname: "Huq",
  footerTag: 'Halal fintech · venture · AI',

  // The scrolling ticker tape under the hero. Short, punchy, all-caps reads best.
  ticker: [
    "FOUNDER — STEALTH", "VENTURE × INVESTMENT ANALYSIS", "ETHICAL FINTECH",
    "BASE10 · 10+ MEMOS", "WOMEN IN VC", "COGSCI · AI · CORP ENTP",
    "THE MONEY MEMO ↗", "ACCESS IS THE EDGE"
  ],

  heroLabel: "Founder · Investor-in-training",
  heroTitle: 'I build companies in <span class="hl">ethical fintech</span> — and analyze the ones worth backing.',
  heroSub: "A market I'm part of, not one I'm guessing at. Cognitive science, AI, and corporate entrepreneurship at Lehigh, with venture and investment work in real rooms.",

  manifesto: 'Three things, one bet: I <span class="hl">build</span> for a market most capital can\'t reach, I <span class="hl">analyze</span> companies like someone with skin in the game, and I <span class="hl">back</span> the idea that the best returns come from going where everyone else is locked out.',

  startup: {
    head: "Niyyah.",
    lede: "Early-stage. Ethical fintech. In stealth — for now.",
    name: "Niyyah",
    kick: "Founder · In the works",
    body: [
      "I'm building in a market I don't have to study, because I'm already in it: ethical fintech for the global Muslim consumer. It's early, and quiet on purpose — the details stay mine until they're ready.",
      "What I'll say out loud: this is one of fintech's fastest-growing, least-served markets, and access is the whole game."
    ],
    frame: 'In stealth. <em>The rest comes when it\'s ready.</em>',
    facts: [
      { k: "Stage", v: "In active development · stealth" },
      { k: "Space", v: "Ethical fintech · the global Muslim consumer" },
      { k: "Updates", v: "<a href='mailto:syedatawheedahuq@gmail.com?subject=Notify%20me%20about%20Niyyah'>Notify me &rarr;</a>" }
    ]
  },

  research: {
    head: "The work, on the record.",
    lede: "Real diligence, real memos, real rooms. Original analysis next.",
    items: [
      { tk: "TRACK RECORD", st: "Co-authored", title: "Base10 Partners · Alif Network",
        body: "Ten-plus investment memos co-authored with the Base10 team — live deal evaluation, not case studies.",
        note: "↳ Selected memos coming soon" },
      { tk: "TRACK RECORD", st: "Active", title: "LehighSiliconValley / Lehigh Women in VC",
        body: "Live due diligence on real companies through LehighSiliconValley, plus founding and running Lehigh's Women in VC initiative." }
    ]
  },

  thesisSection: {
    head: "How I think capital should move.",
    lede: "An allocation discipline that happens to be centuries old.",
    lead: 'AI is about to become the biggest allocator of capital and attention we\'ve ever built. The question isn\'t whether it\'s capable — it\'s <span class="hl">who\'s steering, and on what rules.</span>',
    body: [
      "I come from cognitive science and AI, so I take the mechanics seriously. The opportunity I care about is steering it early — backing AI that expands what people can do and stays accountable to the systems it runs on. Done right, that's not a tax on returns. It's where the durable ones come from.",
      "My framework borrows from a discipline that's been compounding for centuries: tie capital to the real economy, skip pure speculation, screen for harm, stay accountable for what you manage. I read those as allocation rules, not anything else — and they're part of why I price risk differently than the desk next to me."
    ],
    principles: [
      { n: "01", h: "Agency over automation", p: "Technology should widen what a person can do — not quietly decide it for them." },
      { n: "02", h: "Value over speculation", p: "Capital tied to something real, not to noise. Old idea, still underrated." },
      { n: "03", h: "Accountable, not extractive", p: "Measured by whether it sustains the systems it runs on, not just what it pulls out." }
    ]
  },

  contact: {
    head: "Let's talk.",
    links: [
      { label: "Email", href: "mailto:syedatawheedahuq@gmail.com", val: "syedatawheedahuq@gmail.com" },
      { label: "LinkedIn", href: "https://www.linkedin.com/in/syedatawheedahuq", val: "linkedin.com/in/syedatawheedahuq" },
      { label: "Substack", href: "https://substack.com/@themoneymemobytawheedahuq", val: "The Money Memo" }
    ]
  }
};

/* ===================== RENDER (no need to edit below) ===================== */
(function(){
  const $=id=>document.getElementById(id), set=(id,html)=>{const e=$(id);if(e)e.innerHTML=html;};

  set('navMark', `${CONTENT.name}<span class="dot">.</span>`);
  set('footName', `© <span id="yr"></span> ${CONTENT.name} ${CONTENT.surname}`);
  set('footTag', CONTENT.footerTag);

  // ticker (doubled for a seamless loop)
  const items = CONTENT.ticker.map(t=>`<span>${t}</span>`).join('');
  set('ticker', items + items);

  set('heroLabel', CONTENT.heroLabel);
  set('heroTitle', CONTENT.heroTitle);
  set('heroSub', CONTENT.heroSub);
  set('manifestoText', CONTENT.manifesto);

  const s=CONTENT.startup;
  set('startupHead',s.head); set('startupLede',s.lede); set('startupName',s.name);
  set('startupKick',s.kick); set('startupBody',s.body.map(p=>`<p>${p}</p>`).join(''));
  set('startupFrame',s.frame);
  set('startupFacts',s.facts.map(f=>`<li><b>${f.k}</b>${f.v}</li>`).join(''));

  const r=CONTENT.research;
  set('researchHead',r.head); set('researchLede',r.lede);
  set('researchGrid', r.items.map(it=>`<div class="memo">
    <div class="top"><span class="tk">${it.tk}</span><span class="st">${it.st}</span></div>
    <h4>${it.title}</h4><p>${it.body}</p>
    ${it.note?`<span class="note">${it.note}</span>`:''}</div>`).join(''));

  const t=CONTENT.thesisSection;
  set('thesisHead',t.head); set('thesisLede',t.lede);
  set('thesisBody', `<p class="lead">${t.lead}</p>${t.body.map(p=>`<p>${p}</p>`).join('')}`);
  set('principles', t.principles.map(p=>`<div class="principle"><span class="pn">${p.n}</span><h5>${p.h}</h5><p>${p.p}</p></div>`).join(''));

  set('contactHead', CONTENT.contact.head);
  set('contactLinks', CONTENT.contact.links.map(l=>{
    const ext=/^https?:/.test(l.href)?' target="_blank" rel="noopener"':'';
    const v=l.val||l.ph||''; const cls=/^\[.*\]$/.test(v)?'ph':'val';
    return `<a href="${l.href}"${ext}>${l.label} — <span class="${cls}">${v}</span></a>`;
  }).join(''));

  const yr=$('yr'); if(yr) yr.textContent=new Date().getFullYear();
})();

/* nav scroll state */
(function(){const n=document.getElementById('nav');const o=()=>n.classList.toggle('scrolled',scrollY>40);o();addEventListener('scroll',o,{passive:true});})();

/* reveal */
(function(){
  const red=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const els=document.querySelectorAll('.reveal');
  if(red||!('IntersectionObserver'in window)){els.forEach(e=>e.classList.add('in'));return;}
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12});
  els.forEach(e=>io.observe(e));
})();
</script>
</body>
</html>
